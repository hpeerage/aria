name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build with Next.js
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_NAVER_MAPS_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_NAVER_MAPS_CLIENT_ID }}
          NEXT_PUBLIC_KAKAO_JS_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_JS_KEY }}

        run: |
          npm run build
          # 빌드 후 파일 구조 확인 (로그에서 확인 가능)
          ls -R out
          # 만약 out/aria 폴더가 있다면 내용을 루트로 이동 (숨김 파일 포함)
          if [ -d "out/aria" ]; then
            mv out/aria/* out/ 2>/dev/null || true
            mv out/aria/.* out/ 2>/dev/null || true
            rm -rf out/aria
          fi
          # .nojekyll 파일 생성
          touch out/.nojekyll
          # index.html을 404.html로 복사하여 라우팅 문제 방지
          if [ -f "out/index.html" ]; then cp out/index.html out/404.html; fi
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
